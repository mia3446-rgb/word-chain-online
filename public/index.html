<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>WORD CHAIN ARENA</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: min(1040px, 94vw);
      background: rgba(255,255,255,0.16);
      padding: 34px;
      border-radius: 30px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
      text-align: center;
      backdrop-filter: blur(12px);
    }

    h1 {
      font-size: 46px;
      margin: 0;
      font-weight: 900;
      letter-spacing: -2px;
      text-shadow: 0 4px 12px rgba(0,0,0,0.3);
    }

    .subtitle {
      margin: 8px 0 24px;
      opacity: 0.85;
      font-size: 15px;
      font-weight: 700;
    }


    .auth-box {
      display: block;
    }

    .auth-tabs button {
      box-shadow: 0 5px 0 #c99d00;
      padding: 10px 16px;
    }

    #lobby {
      display: none;
    }

    .login-info {
      background: rgba(0,0,0,0.25);
      padding: 10px;
      border-radius: 14px;
      margin-bottom: 12px;
      font-weight: 900;
      color: #fff176;
    }

    .wide-layout {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
      align-items: start;
    }

    input, select {
      width: 85%;
      padding: 15px;
      margin: 8px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      outline: none;
      text-align: center;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 700;
    }

    input:disabled { opacity: 0.55; }

    button {
      padding: 14px 24px;
      margin: 8px;
      border: none;
      border-radius: 14px;
      background: #ffcc00;
      font-weight: 900;
      cursor: pointer;
      font-size: 15px;
      transition: 0.15s;
      box-shadow: 0 8px 0 #c99d00;
      font-family: 'Noto Sans KR', sans-serif;
    }

    button:hover { transform: scale(1.05); }

    button:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #c99d00;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    #game { display: none; }

    .info {
      background: rgba(0,0,0,0.25);
      padding: 13px;
      border-radius: 16px;
      margin: 10px 0;
      font-weight: 700;
    }

    .room {
      font-size: 24px;
      color: #ffe066;
      font-weight: 900;
    }

    .room-card {
      background: rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 12px;
      margin: 10px 0;
      font-weight: 900;
      text-align: left;
    }

    .room-card button {
      width: auto;
      padding: 10px 16px;
      font-size: 13px;
      margin: 8px 0 0;
    }

    .room-meta {
      opacity: 0.9;
      font-size: 14px;
      margin-top: 4px;
    }

    #roomList {
      max-height: 360px;
      overflow-y: auto;
      padding-right: 4px;
    }


    .notice-box {
      display: none;
      background: rgba(255, 82, 82, 0.23);
      border: 2px solid rgba(255,255,255,0.22);
      border-radius: 18px;
      padding: 14px;
      margin: 12px 0;
      font-weight: 900;
      color: #fff176;
      white-space: pre-line;
      text-shadow: 0 3px 8px rgba(0,0,0,0.28);
    }

    .word-box {
      margin: 18px 0;
      padding: 28px;
      border-radius: 24px;
      background: rgba(0,0,0,0.35);
      border: 2px solid rgba(255,255,255,0.25);
    }

    .word-label {
      font-size: 14px;
      opacity: 0.8;
      font-weight: 700;
    }

    #currentWord {
      display: block;
      margin-top: 8px;
      font-size: 68px;
      font-weight: 900;
      color: #fff176;
      text-shadow: 0 4px 12px rgba(0,0,0,0.35);
    }

    #nextHint {
      display: block;
      margin-top: 6px;
      font-size: 24px;
      font-weight: 900;
      color: #ffe066;
    }

    .turn-box {
      font-size: 20px;
      font-weight: 900;
    }

    #turnPlayer {
      color: #ffe066;
      font-size: 26px;
    }

    .timer {
      font-size: 22px;
      font-weight: 900;
    }

    .timer-danger {
      color: #ff5252;
      animation: blink 0.7s infinite;
    }

    @keyframes blink {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.55; }
      100% { transform: scale(1); opacity: 1; }
    }

    .copy-button {
      padding: 8px 12px;
      margin-left: 8px;
      font-size: 13px;
      box-shadow: 0 5px 0 #c99d00;
    }

    .section-title {
      margin-top: 20px;
      font-size: 18px;
      font-weight: 900;
    }

    #players {
      list-style: none;
      padding: 0;
      margin: 8px 0;
    }

    #players li {
      background: rgba(255,255,255,0.18);
      margin: 6px auto;
      padding: 10px;
      border-radius: 12px;
      width: 88%;
      font-weight: 900;
    }

    .disconnected {
      opacity: 0.45;
    }

    .eliminated {
      opacity: 0.45;
      text-decoration: line-through;
    }

    .used-card {
      display: inline-block;
      background: rgba(255,255,255,0.18);
      padding: 8px 12px;
      border-radius: 999px;
      margin: 4px;
      font-weight: 900;
      font-size: 14px;
    }

    #usedWords {
      max-height: 170px;
      overflow-y: auto;
    }

    #message {
      color: #ffe066;
      font-weight: 900;
      min-height: 24px;
      white-space: pre-line;
    }

    #winnerBox {
      display: none;
      background: rgba(255, 204, 0, 0.22);
      border: 2px solid rgba(255, 224, 102, 0.75);
      border-radius: 20px;
      padding: 18px;
      margin-top: 16px;
      font-weight: 900;
      color: #fff176;
      text-shadow: 0 3px 8px rgba(0,0,0,0.25);
    }

    #winnerName {
      font-size: 30px;
      display: block;
      margin-top: 6px;
    }


    .helper-box {
      display: none;
      background: rgba(0,0,0,0.25);
      border-radius: 16px;
      padding: 12px;
      margin: 12px 0;
      font-weight: 900;
    }

    .helper-title {
      color: #ffe066;
      margin-bottom: 8px;
    }

    #remainingWordCount {
      color: #fff176;
      font-size: 20px;
    }

    #recommendedWords {
      margin-top: 8px;
    }

    .recommend-button {
      padding: 8px 12px;
      margin: 4px;
      font-size: 13px;
      box-shadow: 0 5px 0 #c99d00;
    }

    .toggle-row {
      margin-top: 8px;
      font-size: 13px;
      opacity: 0.92;
    }

    .toggle-row input {
      width: auto;
      margin: 0 4px 0 0;
      padding: 0;
    }

    .chat-box {
      background: rgba(0,0,0,0.25);
      border-radius: 16px;
      padding: 12px;
      margin-top: 14px;
    }

    #chatMessages {
      height: 190px;
      overflow-y: auto;
      text-align: left;
      padding: 8px;
      background: rgba(0,0,0,0.22);
      border-radius: 12px;
      font-size: 14px;
    }

    .chat-message {
      margin: 6px 0;
      line-height: 1.35;
      word-break: break-word;
    }

    .chat-nickname {
      color: #ffe066;
      font-weight: 900;
    }

    .chat-system {
      color: #b8ffcf;
      font-weight: 900;
      text-align: center;
    }

    .chat-row {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: center;
      margin-top: 8px;
    }

    #chatInput {
      width: 70%;
      margin: 0;
    }

    #chatSendButton {
      margin: 0;
      padding: 14px 18px;
    }


    .ready-button, .rematch-button {
      background: #8cff66;
      box-shadow: 0 8px 0 #4e9c37;
    }

    .countdown-box {
      display: none;
      font-size: 52px;
      font-weight: 900;
      color: #fff176;
      text-shadow: 0 6px 16px rgba(0,0,0,0.45);
      margin: 16px 0;
      animation: blink 0.7s infinite;
    }

    .result-box {
      display: none;
      background: rgba(0,0,0,0.28);
      border-radius: 18px;
      padding: 14px;
      margin-top: 12px;
      font-weight: 900;
      text-align: left;
    }

    .result-box div {
      margin: 6px 0;
    }

    .spectator-box {
      display: none;
      background: rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 12px;
      margin: 10px 0;
      font-weight: 900;
      color: #ffe066;
    }


    .profile-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 999;
      justify-content: center;
      align-items: center;
    }

    .profile-card {
      width: min(420px, 88vw);
      background: rgba(30,30,60,0.96);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 70px rgba(0,0,0,0.45);
      border: 2px solid rgba(255,255,255,0.18);
      font-weight: 900;
    }

    .profile-card h2 {
      margin: 0 0 12px;
      color: #fff176;
    }

    .profile-row {
      background: rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 10px;
      margin: 7px 0;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .profile-close {
      margin-top: 14px;
    }

    @media (max-width: 720px) {
      .card {
        width: 92vw;
        padding: 24px;
      }

  
    .auth-box {
      display: block;
    }

    .auth-tabs button {
      box-shadow: 0 5px 0 #c99d00;
      padding: 10px 16px;
    }

    #lobby {
      display: none;
    }

    .login-info {
      background: rgba(0,0,0,0.25);
      padding: 10px;
      border-radius: 14px;
      margin-bottom: 12px;
      font-weight: 900;
      color: #fff176;
    }

    .wide-layout {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 36px;
      }

      #currentWord {
        font-size: 52px;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>⚔️ WORD CHAIN ARENA</h1>
    <div class="subtitle">실시간 온라인 끝말잇기</div>

    <div id="authBox" class="auth-box">
      <div class="info">
        <h3>🔐 로그인 / 회원가입</h3>
        <input id="authNickname" placeholder="닉네임 2~12자" />
        <input id="authPassword" placeholder="비밀번호 4자 이상" type="password" />
        <div class="auth-tabs">
          <button onclick="login()">로그인</button>
          <button onclick="register()">회원가입</button>
        </div>
        <div style="font-size:13px; opacity:0.9; margin-top:8px;">
          닉네임은 중복 불가. 로그인한 닉네임으로 전적이 저장됩니다.
        </div>
      </div>
    </div>

    <div id="lobby">
      <div class="login-info">
        👤 로그인: <span id="currentUserName"></span>
        <button onclick="logout()" style="padding:8px 12px; margin-left:8px; font-size:12px;">로그아웃</button>
      </div>
      <div class="wide-layout">
        <div>
          <div class="info">
            <h3>🏠 방 만들기</h3>
            <input id="roomPassword" placeholder="방 비밀번호 입력" />
            <select id="roomPublic">
              <option value="public">🌍 공개방</option>
              <option value="private">🔒 비공개방</option>
            </select>
            <select id="botCount">
              <option value="0">🤖 봇 없음</option>
              <option value="1">🤖 봇 1명</option>
              <option value="2">🤖 봇 2명</option>
              <option value="3">🤖 봇 3명</option>
            </select>
            <select id="botDifficulty">
              <option value="veryEasy">😊 완전 쉬움</option>
              <option value="easy">🙂 쉬움</option>
              <option value="normal" selected>😎 중간</option>
              <option value="hard">🔥 어려움</option>
              <option value="hell">👿 지옥</option>
            </select>
            <button onclick="createRoom()">새 방 만들기</button>
          </div>

          <div class="info">
            <h3>🚪 방번호로 참가</h3>
            <input id="roomCodeInput" placeholder="방번호 입력" />
            <input id="joinPassword" placeholder="비밀번호 입력" />
            <button onclick="joinRoom()">방 참가하기</button>
          </div>
        </div>

        <div class="info">
          <h3>🏠 공개 방 목록</h3>
          <input id="roomSearch" placeholder="방번호/방장 검색" oninput="renderRoomList()" />
          <button onclick="loadRoomList()">새로고침</button>
          <div id="roomList">방 목록 불러오는 중...</div>
        </div>
      </div>
    </div>

    <div id="game">
      <div class="wide-layout">
        <div>
          <div class="info room">
            🏠 ROOM #<span id="roomCode"></span>
            <button class="copy-button" onclick="copyRoomCode()">📋 복사</button>
          </div>
          <div class="info">상태: <span id="status"></span></div>
          <div id="noticeBox" class="notice-box"></div>

          <div class="word-box">
            <div class="word-label">현재 단어</div>
            <span id="currentWord">없음</span>
            <span id="nextHint"></span>
          </div>

          <div class="helper-box" id="helperBox">
            <div class="helper-title">💡 다음 단어 정보</div>
            <div>시작 글자: <span id="requiredStarts">-</span></div>
            <div>남은 단어: <span id="remainingWordCount">0</span>개</div>
            <div class="toggle-row">
              <label><input type="checkbox" id="recommendToggle" checked onchange="renderRecommendations()"> 추천 단어 보기</label>
            </div>
            <div id="recommendedWords"></div>
          </div>

          <div id="countdownBox" class="countdown-box">3</div>

          <div class="info timer">⏱ 남은 시간: <span id="timeLimit">20</span>초</div>
          <div class="info turn-box">🎯 현재 차례<br><span id="turnPlayer"></span></div>

          <div id="spectatorBox" class="spectator-box">👀 관전 중입니다. 채팅은 계속 가능합니다.</div>

          <button id="readyButton" class="ready-button" onclick="toggleReady()">✅ 준비</button>
          <button id="startButton" onclick="startGame()">게임 시작</button>

          <input id="wordInput" placeholder="단어 입력" />
          <button id="submitButton" onclick="submitWord()">제출</button>

          <div id="winnerBox">
            🏆 최종 승리
            <span id="winnerName"></span>
            <div id="resultBox" class="result-box"></div>
            <button id="rematchButton" class="rematch-button" onclick="requestRematch()">🔄 다시하기</button>
          </div>
        </div>

        <div>
          <div class="section-title">👥 참가자</div>
          <ul id="players"></ul>

          <div class="section-title">📜 사용 단어</div>
          <div id="usedWords"></div>

          <div class="chat-box">
            <div class="section-title">💬 채팅</div>
            <div id="chatMessages"></div>
            <div class="chat-row">
              <input id="chatInput" placeholder="메시지 입력" maxlength="100" />
              <button id="chatSendButton" onclick="sendChat()">전송</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <p id="message"></p>
  </div>

  <div id="profileModal" class="profile-modal">
    <div class="profile-card">
      <h2 id="profileName">프로필</h2>
      <div id="profileContent"></div>
      <button class="profile-close" onclick="closeProfile()">닫기</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io(window.location.origin, {
      transports: ["websocket", "polling"]
    });

    let myRoomCode = "";
    let mySocketId = "";
    let isHost = false;
    let latestRooms = [];
    let currentUserNickname = "";

    let playerId = sessionStorage.getItem("wordChainPlayerId");
    if (!playerId) {
      playerId = "p_" + Date.now() + "_" + Math.random().toString(36).slice(2);
      sessionStorage.setItem("wordChainPlayerId", playerId);
    }

    socket.on("connect", () => {
      mySocketId = socket.id;
      loadRoomList();

      const savedNickname = localStorage.getItem("wordChainNickname");
      const savedToken = localStorage.getItem("wordChainToken");

      if (savedNickname && savedToken) {
        socket.emit("autoLogin", { nickname: savedNickname, token: savedToken });
      }
    });

    function register() {
      const nickname = document.getElementById("authNickname").value.trim();
      const password = document.getElementById("authPassword").value;

      socket.emit("register", { nickname, password });
    }

    function login() {
      const nickname = document.getElementById("authNickname").value.trim();
      const password = document.getElementById("authPassword").value;

      socket.emit("login", { nickname, password });
    }

    function logout() {
      localStorage.removeItem("wordChainNickname");
      localStorage.removeItem("wordChainToken");
      currentUserNickname = "";
      document.getElementById("authBox").style.display = "block";
      document.getElementById("lobby").style.display = "none";
      socket.emit("logout");
    }

    function showLoggedIn(nickname, token) {
      currentUserNickname = nickname;
      localStorage.setItem("wordChainNickname", nickname);
      localStorage.setItem("wordChainToken", token);

      document.getElementById("currentUserName").textContent = nickname;
      document.getElementById("authBox").style.display = "none";
      document.getElementById("lobby").style.display = "block";
    }



    function createRoom() {
      const password = document.getElementById("roomPassword").value.trim();
      const isPublic = document.getElementById("roomPublic").value === "public";
      const botCount = Number(document.getElementById("botCount").value);
      const botDifficulty = document.getElementById("botDifficulty").value;

      if (!currentUserNickname) return alert("로그인 먼저 해주세요.");
      if (!password) return alert("방 비밀번호를 입력하세요.");

      socket.emit("createRoom", { password, playerId, isPublic, botCount, botDifficulty });
    }

    function joinRoom() {
      const roomCode = document.getElementById("roomCodeInput").value.trim();
      const password = document.getElementById("joinPassword").value.trim();

      if (!currentUserNickname) {
        return alert("로그인 먼저 해주세요.");
      }

      if (!roomCode) {
        return alert("방번호를 입력하세요.");
      }

      if (!password) {
        return alert("비밀번호를 입력하세요.");
      }

      myRoomCode = roomCode;
      isHost = false;

      socket.emit("joinRoom", { roomCode, password, playerId });
    }

    function loadRoomList() {
      socket.emit("getRoomList");
    }

    function fillRoomCode(code) {
      document.getElementById("roomCodeInput").value = code;
      document.getElementById("roomCodeInput").scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function renderRoomList() {
      const keyword = document.getElementById("roomSearch").value.trim().toLowerCase();
      const roomList = document.getElementById("roomList");

      let rooms = latestRooms;

      if (keyword) {
        rooms = rooms.filter(room =>
          room.code.includes(keyword) ||
          room.hostName.toLowerCase().includes(keyword) ||
          room.title.toLowerCase().includes(keyword)
        );
      }

      rooms = rooms.slice(0, 10);

      if (rooms.length === 0) {
        roomList.innerHTML = "표시할 공개방이 없습니다.";
        return;
      }

      roomList.innerHTML = rooms.map(room => {
        const statusIcon = room.status === "waiting" ? "🟢 대기중" :
          room.status === "playing" ? "🔴 게임중" :
          "⚫ 종료";

        const disabled = room.status === "waiting" ? "" : "disabled";
        const lock = room.locked ? "🔒" : "🌍";

        return `
          <div class="room-card">
            <div>${lock} ${room.title}</div>
            <div class="room-meta">방번호: ${room.code} / 👥 ${room.players}/${room.maxPlayers} / ${statusIcon}</div>
            <button ${disabled} onclick="fillRoomCode('${room.code}')">참가 준비</button>
          </div>
        `;
      }).join("");
    }

    function startGame() {
      socket.emit("startGame", myRoomCode);
    }

    function toggleReady() {
      socket.emit("toggleReady", myRoomCode);
    }

    function requestRematch() {
      socket.emit("requestRematch", myRoomCode);
    }

    function formatDuration(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;

      if (m <= 0) return `${s}초`;
      return `${m}분 ${s}초`;
    }


    function openProfileByNickname(nickname) {
      socket.emit("getProfile", { nickname });
    }

    function closeProfile() {
      document.getElementById("profileModal").style.display = "none";
    }

    function showProfile(profile) {
      const modal = document.getElementById("profileModal");
      const name = document.getElementById("profileName");
      const content = document.getElementById("profileContent");

      name.textContent = `${profile.selectedTitle || ""} ${profile.nickname}`;

      content.innerHTML = `
        <div class="profile-row"><span>⭐ 레벨</span><span>Lv.${profile.level}</span></div>
        <div class="profile-row"><span>✨ 경험치</span><span>${profile.xp} / ${profile.nextXp}</span></div>
        <div class="profile-row"><span>💰 코인</span><span>${profile.coins}</span></div>
        <div class="profile-row"><span>🏆 승리</span><span>${profile.wins}</span></div>
        <div class="profile-row"><span>💀 패배</span><span>${profile.losses}</span></div>
        <div class="profile-row"><span>📈 승률</span><span>${profile.winRate}%</span></div>
        <div class="profile-row"><span>🔥 현재 연승</span><span>${profile.currentWinStreak}</span></div>
        <div class="profile-row"><span>👑 최고 연승</span><span>${profile.bestWinStreak}</span></div>
        <div class="profile-row"><span>📝 사용 단어</span><span>${profile.wordsUsed}</span></div>
        <div class="profile-row"><span>🎖 칭호</span><span>${(profile.titles || []).join(", ")}</span></div>
      `;

      modal.style.display = "flex";
    }

    function renderMatchResult(room) {
      const resultBox = document.getElementById("resultBox");
      const result = room.matchResult || {};
      const order = result.eliminationOrder || [];
      const rewards = result.rewards || [];

      const rewardHtml = rewards.length > 0
        ? rewards.map(item => `<div>${item.result === "win" ? "🏆" : "💀"} ${item.nickname}: +${item.xp}XP / +${item.coins}코인${item.leveledUp ? " 🎉 LEVEL UP!" : ""}</div>`).join("")
        : "<div>보상 정보 없음</div>";

      const orderHtml = order.length > 0
        ? order.map((item, index) => `<div>${index + 1}. ${item.nickname} - ${item.reason}</div>`).join("")
        : "<div>탈락자 없음</div>";

      resultBox.innerHTML = `
        <div>⏱ 경기 시간: ${formatDuration(result.durationSec || 0)}</div>
        <div>📝 사용 단어: ${result.usedWordCount || 0}개</div>
        <div>🎁 보상</div>
        ${rewardHtml}
        <div>💀 탈락 순서</div>
        ${orderHtml}
      `;
    }


    let localNoticeTimer = null;

    function showNotice(text, duration = 2500) {
      const noticeBox = document.getElementById("noticeBox");
      if (!noticeBox) return;

      if (!text) {
        noticeBox.style.display = "none";
        noticeBox.textContent = "";
        return;
      }

      noticeBox.textContent = text;
      noticeBox.style.display = "block";

      if (localNoticeTimer) {
        clearTimeout(localNoticeTimer);
        localNoticeTimer = null;
      }

      localNoticeTimer = setTimeout(() => {
        if (noticeBox.textContent === text) {
          noticeBox.style.display = "none";
          noticeBox.textContent = "";
        }
      }, duration);
    }

    function submitWord() {
      const wordInput = document.getElementById("wordInput");
      const word = wordInput.value.trim();
      if (!word) return;

      socket.emit("submitWord", { roomCode: myRoomCode, word });
      wordInput.value = "";
      wordInput.focus();
    }

    function copyRoomCode() {
      if (!myRoomCode) return;

      navigator.clipboard.writeText(myRoomCode)
        .then(() => {
          const message = document.getElementById("message");
          message.textContent = `방번호 ${myRoomCode} 복사 완료!`;

          setTimeout(() => {
            if (message.textContent.includes("복사 완료")) {
              message.textContent = "";
            }
          }, 2000);
        })
        .catch(() => {
          alert("복사 실패! 방번호를 직접 복사해 주세요: " + myRoomCode);
        });
    }

    document.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && document.activeElement.id === "wordInput") {
        event.preventDefault();
        submitWord();
      }
    });

    let latestRecommendedWords = [];

    function fillRecommendedWord(word) {
      const wordInput = document.getElementById("wordInput");
      wordInput.value = word;
      wordInput.focus();
    }

    function renderRecommendations() {
      const recommendedWords = document.getElementById("recommendedWords");
      const toggle = document.getElementById("recommendToggle");

      if (!recommendedWords || !toggle) return;

      if (!toggle.checked) {
        recommendedWords.innerHTML = "추천 단어 숨김";
        return;
      }

      if (!latestRecommendedWords || latestRecommendedWords.length === 0) {
        recommendedWords.innerHTML = "추천 단어 없음";
        return;
      }

      recommendedWords.innerHTML = latestRecommendedWords.map(word =>
        `<button class="recommend-button" onclick="fillRecommendedWord('${word}')">${word}</button>`
      ).join("");
    }



    function sendChat() {
      const chatInput = document.getElementById("chatInput");
      const text = chatInput.value.trim();

      if (!text || !myRoomCode) return;

      socket.emit("sendChat", { roomCode: myRoomCode, text });
      chatInput.value = "";
    }

    document.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && document.activeElement.id === "chatInput") {
        sendChat();
      }
    });

    socket.on("authSuccess", ({ nickname, token }) => {
      showLoggedIn(nickname, token);
      showNotice(`✅ 로그인 성공!\n\n${nickname}`, 1800);
    });

    socket.on("authError", (msg) => {
      if (msg !== "자동 로그인 실패") {
        showNotice(`❌ ${msg}`, 2500);
      }
    });

    socket.on("loggedOut", () => {
      showNotice("로그아웃 완료", 1500);
    });

    socket.on("roomList", (rooms) => {
      latestRooms = rooms || [];
      renderRoomList();
    });

    socket.on("roomCreated", (roomCode) => {
      myRoomCode = roomCode;
      isHost = true;

      document.getElementById("authBox").style.display = "none";
      document.getElementById("authBox").style.display = "none";
      document.getElementById("authBox").style.display = "none";
      document.getElementById("lobby").style.display = "none";
      document.getElementById("game").style.display = "block";
      document.getElementById("roomCode").textContent = roomCode;
    });

    socket.on("joinedRoom", (roomCode) => {
      myRoomCode = roomCode;
      isHost = false;

      document.getElementById("lobby").style.display = "none";
      document.getElementById("game").style.display = "block";
      document.getElementById("roomCode").textContent = roomCode;
    });

    socket.on("roomUpdate", (room) => {
      document.getElementById("lobby").style.display = "none";
      document.getElementById("game").style.display = "block";

      document.getElementById("roomCode").textContent = myRoomCode;

      isHost = room.hostId === playerId;

      const statusText =
        room.status === "waiting" ? "🟡 대기중" :
        room.status === "countdown" ? "⏳ 카운트다운" :
        room.status === "playing" ? "🟢 게임중" :
        "🔴 게임오버";

      document.getElementById("status").textContent = statusText;

      if (room.notice) {
        showNotice(room.notice, Math.max(1200, (room.noticeUntil || Date.now() + 2000) - Date.now()));
      }

      document.getElementById("currentWord").textContent = room.currentWord || "없음";

      if (room.currentWord && room.nextStarts && room.nextStarts.length > 0) {
        document.getElementById("nextHint").textContent = `(${room.nextStarts.join("/")})`;
      } else {
        document.getElementById("nextHint").textContent = "";
      }

      const helperBox = document.getElementById("helperBox");

      if (room.status === "playing" && room.currentWord) {
        helperBox.style.display = "block";

        document.getElementById("requiredStarts").textContent =
          room.requiredStarts && room.requiredStarts.length > 0 ? room.requiredStarts.join(" / ") : "-";

        document.getElementById("remainingWordCount").textContent = room.remainingWordCount ?? 0;

        latestRecommendedWords = room.recommendedWords || [];
        renderRecommendations();
      } else {
        helperBox.style.display = "none";
        latestRecommendedWords = [];
      }

      const timerBox = document.querySelector(".timer");
      document.getElementById("timeLimit").textContent = room.timeLeft ?? 20;

      if (room.status === "playing" && (room.timeLeft ?? 20) <= 5) {
        timerBox.classList.add("timer-danger");
      } else {
        timerBox.classList.remove("timer-danger");
      }

      document.getElementById("turnPlayer").textContent =
        room.turnPlayerName ? room.turnPlayerName : "";

      document.getElementById("players").innerHTML =
        room.players.map((p, index) => {
          const icon = p.playerId === room.turnPlayerId && room.status === "playing" && !p.eliminated ? "👑" : (p.isBot ? "🤖" : "⚔️");
          const host = p.playerId === room.hostId ? " 👑방장" : "";
          const offline = p.connected ? "" : " (연결 끊김)";
          const eliminated = p.eliminated ? " 💀탈락" : "";
          const ready = room.status === "waiting" && !p.isBot ? (room.readyPlayers && room.readyPlayers[p.playerId] ? " ✅준비" : " ⏳미준비") : "";
          const cls =
            (p.connected ? "" : "disconnected ") +
            (p.eliminated ? "eliminated" : "");

          const profileText = p.profile ? ` Lv.${p.profile.level} ${p.profile.selectedTitle || ""}` : "";
          const click = p.isBot ? "" : `onclick="openProfileByNickname('${p.nickname}')" style="cursor:pointer"`;
          return `<li class="${cls.trim()}" ${click}>${icon}${profileText} ${p.nickname}${host}${offline}${eliminated}${ready}</li>`;
        }).join("");

      document.getElementById("usedWords").innerHTML =
        room.usedWords.map(w => `<span class="used-card">🍎 ${w}</span>`).join("");

      const countdownBox = document.getElementById("countdownBox");
      if (room.status === "countdown") {
        countdownBox.style.display = "block";
        countdownBox.textContent = room.countdown || "START";
      } else {
        countdownBox.style.display = "none";
      }

      const readyButton = document.getElementById("readyButton");
      const startButton = document.getElementById("startButton");

      const myReady = room.readyPlayers && room.readyPlayers[playerId];

      readyButton.style.display = room.status === "waiting" ? "inline-block" : "none";
      readyButton.textContent = myReady ? "✅ 준비 완료" : "✅ 준비";
      startButton.style.display = room.status === "waiting" && isHost ? "inline-block" : "none";
      startButton.disabled = !room.canStart;

      const myPlayer = room.players.find(p => p.playerId === playerId);
      const isSpectator = room.status === "playing" && myPlayer && myPlayer.eliminated;
      document.getElementById("spectatorBox").style.display = isSpectator ? "block" : "none";

      const myTurn = room.status === "playing" && room.turnPlayerId === playerId;
      const wordInput = document.getElementById("wordInput");

      document.getElementById("submitButton").disabled = !myTurn;
      wordInput.disabled = !myTurn;
      document.getElementById("chatInput").disabled = false;
      document.getElementById("chatSendButton").disabled = false;

      const activeId = document.activeElement ? document.activeElement.id : "";

      if (myTurn && activeId !== "chatInput") {
        wordInput.focus();
      }

      const winnerBox = document.getElementById("winnerBox");
      const winnerName = document.getElementById("winnerName");

      if (room.status === "gameover") {
        document.getElementById("message").textContent = room.gameoverReason || "게임오버!";
        winnerBox.style.display = "block";
        winnerName.textContent = room.winnerText || "승자 없음";
        renderMatchResult(room);
        document.getElementById("resultBox").style.display = "block";
        document.getElementById("rematchButton").style.display = isHost ? "inline-block" : "none";
      } else {
        winnerBox.style.display = "none";
        winnerName.textContent = "";
        document.getElementById("resultBox").style.display = "none";
        document.getElementById("rematchButton").style.display = "none";

        if (room.lastNotice) {
          document.getElementById("message").textContent = room.lastNotice;
        }
      }
    });

    socket.on("profileData", (profile) => {
      showProfile(profile);
    });

    socket.on("chatUpdate", (messages) => {
      const chatMessages = document.getElementById("chatMessages");

      if (!chatMessages) return;

      chatMessages.innerHTML = (messages || []).map(msg => {
        if (msg.type === "system") {
          return `<div class="chat-message chat-system">${msg.text}</div>`;
        }

        return `
          <div class="chat-message">
            <span class="chat-nickname">${msg.nickname}</span>
            <span>: ${msg.text}</span>
          </div>
        `;
      }).join("");

      chatMessages.scrollTop = chatMessages.scrollHeight;
    });

    socket.on("errorMessage", (msg) => {
      showNotice(msg, 2800);
    });
  </script>
</body>
</html>
